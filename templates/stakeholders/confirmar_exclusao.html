{% extends 'base.html' %}
{% block title %}Excluir Stakeholder{% endblock %}
{% block page_title %}Confirmar Exclusão{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="table-card p-4 text-center">
      <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3 d-block"></i>
      <h5>Excluir stakeholder?</h5>
      <p class="text-muted">Você está prestes a excluir <strong>{{ obj.nome }}</strong>. Esta ação não pode ser desfeita.</p>
      <form method="post" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i> Confirmar Exclusão</button>
        <a href="{% url 'stakeholders:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
